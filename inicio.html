        .night {

        /* 🌟 Confeti Tradicional de Colores */
        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {

            top: -20px;

    <script>
        // Función para generar confeti colorido (cuadrícula y círculos)
        function createColorConfetti() {
            const colors = ['#f472b6', '#34d399', '#fbbf24', '#60a5fa', '#a78bfa', '#f87171']; // Colores vibrantes (rosa, verde menta, amarillo, azul, violeta, rojo sandía)
            const confettiCount = window.innerWidth < 768 ? 40 : 80;
            
            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                
                // Distribución horizontal y aleatoria
                confetti.style.left = Math.random() * 100 + 'vw';
                
                // Variación de velocidad y retardo
                confetti.style.animationDuration = (Math.random() * 3 + 2.5) + 's';
                confetti.style.animationDelay = Math.random() * 5 + 's';
                
                // Color aleatorio
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Algunos cuadrados, algunos círculos
                if (Math.random() > 0.4) confetti.style.borderRadius = '50%';
                
                // Variación de tamaños
                const size = (Math.random() * 8 + 6) + 'px';
                confetti.style.width = size;
                confetti.style.height = size;
                
                document.body.appendChild(confetti);
            }
        }

        // Función para mantener los parámetros en la URL al navegar
        function navigateTo(page) {
            const currentParams = window.location.search;
            window.location.href = page + currentParams;
        }

        window.onload = () => {
            // Generar el confeti tradicional de colores
            createColorConfetti();

            document.body.classList.remove("container");
            
            // Leer parámetros de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const nameParam = urlParams.get('n');
            
            // Si hay un nombre, actualizar el mensaje
            if (nameParam) {
                document.getElementById('nomPerson').textContent = nameParam;
            }
        };
    </script>

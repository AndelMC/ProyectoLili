<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sugarboo</title>
    <link rel="icon" type="image/x-icon" href="source/floramarilla.ico">
    <link rel="stylesheet" href="css/kitty.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Pacifico&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        /* 🌟 Confeti Tradicional de Colores */
        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti-piece {
            position: fixed;
            top: -20px;
            z-index: 1000;
            pointer-events: none;
            width: 12px;
            height: 12px;
            animation: confettiFall linear infinite;
        }
    </style>
</head>
<body>
    <h1 class="title" id="tituloAmor">Te amo <span id="petnameText">mi Sugarboo</span>💗</h1> <!-- Título encima -->
    <div class="sanrio"></div> <!-- Hello Kitty en el centro -->
    <h2 class="subtitle" id="mensajeAmor">Eres mi razón de ser</h2> <!-- Subtítulo debajo -->

    <button title="INICIO" id="sugar-button" onclick="navigateTo('inicio.html')" style="background: linear-gradient(135deg, #f6d654 0%, #eab308 100%); color: #422006; border: none; box-shadow: 0 4px 15px rgba(246,214,84,0.4);">
        <i class="fa-solid fa-house-chimney"></i> 
    </button>
    
    <script>
        // Función para generar confeti colorido
        function createColorConfetti() {
            const colors = ['#f472b6', '#34d399', '#fbbf24', '#60a5fa', '#a78bfa', '#f87171']; 
            const confettiCount = window.innerWidth < 768 ? 40 : 80;
            
            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = (Math.random() * 3 + 2.5) + 's';
                confetti.style.animationDelay = Math.random() * 5 + 's';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                if (Math.random() > 0.4) confetti.style.borderRadius = '50%';
                
                const size = (Math.random() * 8 + 6) + 'px';
                confetti.style.width = size;
                confetti.style.height = size;
                
                document.body.appendChild(confetti);
            }
        }

        function navigateTo(page) {
            const currentParams = window.location.search;
            window.location.href = page + currentParams;
        }

        window.onload = () => {
            createColorConfetti(); // Iniciar lluvia de confeti
            
            const urlParams = new URLSearchParams(window.location.search);
            const petnameParam = urlParams.get('p');
            const mensajeParam = urlParams.get('m');
            
            if (petnameParam) {
                document.getElementById('petnameText').textContent = petnameParam;
            }
            if (mensajeParam) {
                document.getElementById('mensajeAmor').textContent = mensajeParam;
            }
        };
    </script>
</body>
</html>
